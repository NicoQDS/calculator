<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
</head>
    <link rel="stylesheet" href="styles.css">
    <script src="javascript.js" defer></script>
<body>

<div class="main-container">

    <div class="flex-grid-container" aria-label="calculator grid 4x4">
        <!-- Display row -->
        <div class="calculator-display"></div>

        <!-- 4x4 button grid -->
        <div id="grid-cell-7">7</div>
        <div id="grid-cell-8">8</div>
        <div id="grid-cell-9">9</div>
        <div id="grid-cell-/">÷</div>

        <div id="grid-cell-4">4</div>
        <div id="grid-cell-5">5</div>
        <div id="grid-cell-6">6</div>
        <div id="grid-cell-x">×</div>

        <div id="grid-cell-1">1</div>
        <div id="grid-cell-2">2</div>
        <div id="grid-cell-3">3</div>
        <div id="grid-cell--">−</div>

        <div id="grid-cell-0">0</div>
        <div id="grid-cell-=">=</div>
        <div id="grid-cell-DEL">DEL</div>
        <div id="grid-cell-+">+</div>
    </div>

</div>
</body>
</html>
