<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
</head>
    <link rel="stylesheet" href="styles.css">
    <script src="javascript.js" defer></script>
<body>

<div class="main-container">

    <div class="flex-grid-container" aria-label="calculator grid 4x4">
        <!-- Display row -->
        <div class="calculator-display">0</div>

        <!-- 4x4 button grid -->
        <div id="grid-cell-1">7</div>
        <div id="grid-cell-2">8</div>
        <div id="grid-cell-3">9</div>
        <div id="grid-cell-4">÷</div>

        <div id="grid-cell-5">4</div>
        <div id="grid-cell-6">5</div>
        <div id="grid-cell-7">6</div>
        <div id="grid-cell-8">×</div>

        <div id="grid-cell-9">1</div>
        <div id="grid-cell-10">2</div>
        <div id="grid-cell-11">3</div>
        <div id="grid-cell-12">−</div>

        <div id="grid-cell-13">0</div>
        <div id="grid-cell-14">=</div>
        <div id="grid-cell-15">DEL</div>
        <div id="grid-cell-16">+</div>
    </div>

</div>
</body>
</html>
